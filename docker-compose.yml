version: "3.9"

# Usage:
#   Dev:  docker compose up --build -d
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  postgres:
    image: postgres:16-alpine
    container_name: idm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-idm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idm_dev_password}
      POSTGRES_DB:       ${POSTGRES_DB:-idm_backup}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-idm} -d ${POSTGRES_DB:-idm_backup}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *logging
    networks: [idm-net]

  redis:
    image: redis:7-alpine
    container_name: idm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging
    networks: [idm-net]

  vault:
    image: hashicorp/vault:1.17
    container_name: idm-vault
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL:          warn
    ports:
      - "${VAULT_PORT:-8200}:8200"
    volumes:
      - vaultdata:/vault/data
      - vaultlogs:/vault/logs
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *logging
    networks: [idm-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idm-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-idm}:${POSTGRES_PASSWORD:-idm_dev_password}@postgres:5432/${POSTGRES_DB:-idm_backup}
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      VAULT_ADDR:   http://vault:8200
      VAULT_TOKEN:  ${VAULT_TOKEN:-dev-root-token}
      APP_ENV:      ${APP_ENV:-development}
      DEBUG:        ${DEBUG:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${SSH_KEY_PATH:-~/.ssh}:/home/appuser/.ssh:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      vault:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/stats/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *logging
    networks: [idm-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: idm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *logging
    networks: [idm-net]

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idm-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-idm}:${POSTGRES_PASSWORD:-idm_dev_password}@postgres:5432/${POSTGRES_DB:-idm_backup}
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      VAULT_ADDR:   http://vault:8200
      VAULT_TOKEN:  ${VAULT_TOKEN:-dev-root-token}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ${SSH_KEY_PATH:-~/.ssh}:/home/appuser/.ssh:ro
    logging: *logging
    networks: [idm-net]

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idm-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-idm}:${POSTGRES_PASSWORD:-idm_dev_password}@postgres:5432/${POSTGRES_DB:-idm_backup}
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    logging: *logging
    networks: [idm-net]

volumes:
  pgdata:
  redisdata:
  vaultdata:
  vaultlogs:

networks:
  idm-net:
    driver: bridge
    name: idm-network
